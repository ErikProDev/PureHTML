<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floresta Sombria - RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #game-container {
            background: #111;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0, 120, 0, 0.2);
        }
        /* Menus */
        .menu {
            text-align: center;
        }
        .menu h1 {
            color: #cfc;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 0 8px #4a6;
        }
        .menu button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #555;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu button:hover {
            background: #2a2a2a;
            border-color: #4a6;
            color: #fff;
        }
        .hidden {
            display: none;
        }
        #dificuldade-botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #dificuldade-botoes button {
            flex: 1;
        }
        /* Área do jogo */
        #jogo {
            display: none;
        }
        #story {
            background: #1a1a1a;
            padding: 15px;
            border-left: 4px solid #4a6;
            margin-bottom: 20px;
            line-height: 1.6;
            min-height: 120px;
            white-space: pre-wrap;
            word-wrap: break-word;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        #story.show {
            opacity: 1;
        }
        #input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        #command {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }
        #command:disabled {
            opacity: 0.5;
        }
        button {
            padding: 10px 15px;
            background: #2a2a2a;
            border: 1px solid #555;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover:not(:disabled) {
            background: #3a3a3a;
            border-color: #4a6;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #roll-btn {
            background: #2a2a3a;
            border-color: #665;
            display: none;
        }
        #roll-btn.visible {
            display: inline-block;
        }
        #roll-btn:hover:not(:disabled) {
            background: #3a3a4a;
            border-color: #aa8;
        }
        #feedback {
            color: #e66;
            font-style: italic;
            min-height: 20px;
            margin-top: 10px;
        }
        .gameover-text {
            color: #e44;
            font-weight: bold;
            text-shadow: 0 0 5px red;
        }
        .victory-text {
            color: #4a6;
            font-weight: bold;
            text-shadow: 0 0 5px green;
        }
        #restart-btn {
            display: none;
            margin-top: 15px;
            width: 100%;
        }
        /* Contexto animação */
        #contexto {
            text-align: center;
        }
        #contexto p {
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        #contexto p.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Menu Principal -->
        <div id="menu-principal" class="menu">
            <h1>🌲 Floresta Sombria</h1>
            <button id="btn-iniciar">Iniciar Jornada</button>
            <button id="btn-opcoes">Opções</button>
            <button id="btn-sobre">Sobre</button>
        </div>

        <!-- Menu Opções -->
        <div id="menu-opcoes" class="menu hidden">
            <h2>Opções</h2>
            <p id="audio-status">Áudio: Desligado</p>
            <button id="btn-audio">Ligar Áudio</button>
            <button id="btn-voltar-opcoes">Voltar</button>
        </div>

        <!-- Menu Sobre -->
        <div id="menu-sobre" class="menu hidden">
            <h2>Sobre</h2>
            <p>Criado por <strong>Erik</strong> com a ajuda do <strong>Deepseek</strong></p>
            <p>RPG de digitação com sistema de dados e múltiplos finais.</p>
            <button id="btn-voltar-sobre">Voltar</button>
        </div>

        <!-- Seleção de Dificuldade -->
        <div id="menu-dificuldade" class="menu hidden">
            <h2>Escolha a Dificuldade</h2>
            <div id="dificuldade-botoes">
                <button id="btn-tranquilo">🌿 Tranquilo</button>
                <button id="btn-original">⚔️ Original</button>
                <button id="btn-maldito">💀 Maldito</button>
            </div>
            <button id="btn-voltar-dificuldade" style="margin-top:15px;">Voltar</button>
        </div>

        <!-- Contexto (animação antes do jogo) -->
        <div id="contexto" class="hidden">
            <p id="contexto-texto"></p>
        </div>

        <!-- Área do Jogo -->
        <div id="jogo">
            <div id="story"></div>
            <div id="input-area">
                <input type="text" id="command" placeholder="Digite seu comando..." autofocus>
                <button id="submit-btn">Enviar</button>
            </div>
            <button id="roll-btn" title="Rolar um D20">🎲 Rolar D20</button>
            <div id="feedback"></div>
            <button id="restart-btn">🔄 Reiniciar Jornada</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== CENAS DO JOGO ==========
            const scenes = {
                entrada: {
                    text: "Você está na entrada da Floresta Sombria. Árvores retorcidas bloqueiam a luz. O vento sussurra avisos.\n\nDigite 'entrar' para adentrar a floresta.",
                    options: { entrar: "trilha" },
                    allowRoll: false,
                    risk: 0
                },
                trilha: {
                    text: "A trilha se divide. Luz de vaga-lumes à esquerda, escuridão à direita.\n\nDigite 'luz' para seguir a luz ou 'escuro' para as sombras.",
                    options: { luz: "lobo", escuro: "cogumelos" },
                    allowRoll: false,
                    risk: 0
                },
                lobo: {
                    text: "Um lobo cinzento bloqueia o caminho! Ele rosna ferozmente.\n\nDigite 'lutar' para enfrentá-lo ou 'fugir' para correr.",
                    options: { lutar: "cabana", fugir: "gameover_lobo" },
                    allowRoll: false,
                    risk: 0.1 // 10% de falha inesperada no original, maior no maldito
                },
                cogumelos: {
                    text: "Cogumelos brilhantes exalam aroma adocicado.\n\nDigite 'comer' para experimentar ou 'ignorar' para seguir.",
                    options: { comer: "gameover_cogumelo", ignorar: "ponte" },
                    allowRoll: false,
                    risk: 0.2
                },
                cabana: {
                    text: "Uma cabana antiga com luz bruxuleante. Porta entreaberta.\n\nDigite 'entrar' para investigar ou 'passar' para ignorar.",
                    options: { entrar: "interior_cabana", passar: "ponte" },
                    allowRoll: false,
                    risk: 0.05
                },
                interior_cabana: {
                    text: "Um velho sábio joga dados sobre a mesa.\n'Teste sua sorte, aventureiro. Digite 'rolar' para lançar os dados!'",
                    options: {}, // apenas rolar
                    allowRoll: true,
                    rollMinSuccess: 12,
                    rollSuccessScene: "sabio_ajuda",
                    rollFailScene: "sabio_trapaca",
                    risk: 0
                },
                sabio_ajuda: {
                    text: "", // preenchido dinamicamente
                    options: { beber: "ponte_segura" },
                    allowRoll: false,
                    risk: 0,
                    dynamicText: function(result) {
                        return `Você tirou ${result} no dado! O sábio lhe entrega uma poção azul.\n"Beba, isso lhe dará forças."\n\nDigite 'beber' para tomar a poção.`;
                    }
                },
                sabio_trapaca: {
                    text: "",
                    options: { seguir: "gameover_trapaca" },
                    allowRoll: false,
                    risk: 0,
                    dynamicText: function(result) {
                        return `Você tirou ${result}. O sábio ri e desaparece. Névoa densa o envolve.\nDigite 'seguir' para tentar sair.`;
                    }
                },
                ponte: {
                    text: "Ponte de corda sobre abismo. Tábuas apodrecidas balançam.\n\nDigite 'atravessar' para cruzar ou 'desistir' para voltar.",
                    options: { atravessar: "saida", desistir: "gameover_ponte" },
                    allowRoll: false,
                    risk: 0.3
                },
                ponte_segura: {
                    text: "Graças à poção, você se sente confiante. A ponte parece firme.\n\nDigite 'atravessar' para cruzar.",
                    options: { atravessar: "saida" },
                    allowRoll: false,
                    risk: 0
                },
                saida: {
                    text: "A saída da floresta! A luz do sol brilha através das árvores.\n\nDigite 'sair' para escapar.",
                    options: { sair: "vitoria" },
                    allowRoll: false,
                    risk: 0.1
                },
                vitoria: {
                    text: "✨ Você escapou da Floresta Sombria! ✨\nO reino está salvo. Você é um herói!",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isEnding: true
                },
                gameover_lobo: {
                    text: "O lobo é mais rápido. Ele o derruba e...\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                },
                gameover_cogumelo: {
                    text: "Veneno mortal corre em suas veias.\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                },
                gameover_trapaca: {
                    text: "Você cambaleia na névoa e cai num poço.\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                },
                gameover_ponte: {
                    text: "Uma rajada de vento te derruba no abismo.\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                },
                gameover_generico: {
                    text: "Ação inválida! A floresta pune os indecisos. Você cai num buraco escuro.\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                },
                gameover_azar: {
                    text: "O destino foi cruel. Uma armadilha oculta se ativa.\n💀 Você morreu. 💀",
                    options: {},
                    allowRoll: false,
                    risk: 0,
                    isGameOver: true
                }
            };

            // Estado do jogo
            let currentSceneId = "entrada";
            let gameActive = false;
            let difficulty = "original"; // padrão
            let audioEnabled = false;

            // Elementos DOM
            const menuPrincipal = document.getElementById("menu-principal");
            const menuOpcoes = document.getElementById("menu-opcoes");
            const menuSobre = document.getElementById("menu-sobre");
            const menuDificuldade = document.getElementById("menu-dificuldade");
            const contextoDiv = document.getElementById("contexto");
            const contextoTexto = document.getElementById("contexto-texto");
            const jogoDiv = document.getElementById("jogo");
            const storyEl = document.getElementById("story");
            const commandInput = document.getElementById("command");
            const submitBtn = document.getElementById("submit-btn");
            const rollBtn = document.getElementById("roll-btn");
            const feedbackEl = document.getElementById("feedback");
            const restartBtn = document.getElementById("restart-btn");
            const audioStatus = document.getElementById("audio-status");
            const btnAudio = document.getElementById("btn-audio");

            // ========== FUNÇÕES DE INTERFACE ==========
            function showScreen(screenId) {
                [menuPrincipal, menuOpcoes, menuSobre, menuDificuldade, contextoDiv, jogoDiv].forEach(el => el.classList.add("hidden"));
                document.getElementById(screenId).classList.remove("hidden");
            }

            // ========== ÁUDIO (placeholder) ==========
            function toggleAudio() {
                audioEnabled = !audioEnabled;
                audioStatus.textContent = "Áudio: " + (audioEnabled ? "Ligado" : "Desligado");
                btnAudio.textContent = audioEnabled ? "Desligar Áudio" : "Ligar Áudio";
                // Futuro: inicializar/parar música de fundo
            }

            // ========== INICIAR JOGO COM DIFICULDADE ==========
            function startGame(dif) {
                difficulty = dif;
                showScreen("contexto");
                contextoTexto.textContent = "Você é um aventureiro que precisa atravessar a temida Floresta Sombria para salvar o reino. Cada passo pode ser o último...";
                contextoTexto.classList.add("show");
                // Após 3 segundos, inicia o jogo com fade-in
                setTimeout(() => {
                    showScreen("jogo");
                    jogoDiv.style.display = "block";
                    storyEl.classList.add("show");
                    gameActive = true;
                    transitionTo("entrada");
                }, 3000);
            }

            // ========== MECÂNICA DE CENAS ==========
            function normalize(str) {
                return str.trim().toLowerCase();
            }

            function displayScene(sceneId, extraData = null) {
                const scene = scenes[sceneId];
                let text = scene.text;
                if (scene.dynamicText && extraData !== null) {
                    text = scene.dynamicText(extraData);
                }
                storyEl.innerHTML = text.replace(/\n/g, "<br>");
                storyEl.classList.remove("gameover-text", "victory-text");
                if (scene.isGameOver) storyEl.classList.add("gameover-text");
                if (sceneId === "vitoria") storyEl.classList.add("victory-text");
                feedbackEl.textContent = "";

                // Controle do botão de rolar dados
                if (scene.allowRoll && gameActive) {
                    rollBtn.classList.add("visible");
                } else {
                    rollBtn.classList.remove("visible");
                }
            }

            function transitionTo(sceneId, extraData = null) {
                if (!gameActive && sceneId !== "entrada") return;
                const scene = scenes[sceneId];
                displayScene(sceneId, extraData);
                currentSceneId = sceneId;

                if (scene.isEnding || scene.isGameOver) {
                    gameActive = false;
                    commandInput.disabled = true;
                    submitBtn.disabled = true;
                    rollBtn.disabled = true;
                    restartBtn.style.display = "block";
                } else {
                    commandInput.disabled = false;
                    submitBtn.disabled = false;
                    rollBtn.disabled = false;
                    restartBtn.style.display = "none";
                    commandInput.focus();
                }
            }

            // ========== SISTEMA DE RISCO POR DIFICULDADE ==========
            function applyRisk(scene) {
                if (!scene.risk || scene.risk <= 0) return null;
                let chance = scene.risk;
                if (difficulty === "original") {
                    // mantém chance base
                } else if (difficulty === "maldito") {
                    chance *= 2.5; // muito mais perigoso
                } else { // tranquilo
                    chance = 0; // sem risco
                }
                if (chance > 0 && Math.random() < chance) {
                    return "gameover_azar"; // morte por azar
                }
                return null;
            }

            function processInput() {
                if (!gameActive) return;
                const raw = commandInput.value;
                const input = normalize(raw);
                commandInput.value = "";
                feedbackEl.textContent = "";

                const scene = scenes[currentSceneId];

                // Comando especial "rolar" (apenas se permitido)
                if (input === "rolar") {
                    if (scene.allowRoll) {
                        rollDice();
                    } else {
                        feedbackEl.textContent = "⚠️ Não há nada para rolar aqui.";
                    }
                    return;
                }

                // Verifica se comando é válido
                if (!scene.options || !scene.options.hasOwnProperty(input)) {
                    transitionTo("gameover_generico");
                    return;
                }

                // Risco de falha inesperada baseado na dificuldade
                const riskResult = applyRisk(scene);
                if (riskResult) {
                    transitionTo(riskResult);
                    return;
                }

                // Transição normal
                const nextId = scene.options[input];
                transitionTo(nextId);
            }

            function rollDice() {
                if (!gameActive) return;
                const scene = scenes[currentSceneId];
                if (!scene.allowRoll) {
                    feedbackEl.textContent = "⚠️ Você não pode rolar dados agora.";
                    return;
                }

                const roll = Math.floor(Math.random() * 20) + 1;
                const success = roll >= scene.rollMinSuccess;
                const nextScene = success ? scene.rollSuccessScene : scene.rollFailScene;
                feedbackEl.textContent = `🎲 Você rolou ${roll}. ${success ? "Sucesso!" : "Fracasso..."}`;
                transitionTo(nextScene, roll);
            }

            function restartGame() {
                gameActive = false;
                commandInput.disabled = true;
                submitBtn.disabled = true;
                rollBtn.disabled = true;
                restartBtn.style.display = "none";
                storyEl.classList.remove("show");
                // Volta ao menu de dificuldade
                showScreen("menu-dificuldade");
                jogoDiv.style.display = "none";
            }

            // ========== EVENT LISTENERS ==========
            // Menus
            document.getElementById("btn-iniciar").addEventListener("click", () => showScreen("menu-dificuldade"));
            document.getElementById("btn-opcoes").addEventListener("click", () => showScreen("menu-opcoes"));
            document.getElementById("btn-sobre").addEventListener("click", () => showScreen("menu-sobre"));
            document.getElementById("btn-voltar-opcoes").addEventListener("click", () => showScreen("menu-principal"));
            document.getElementById("btn-voltar-sobre").addEventListener("click", () => showScreen("menu-principal"));
            document.getElementById("btn-voltar-dificuldade").addEventListener("click", () => showScreen("menu-principal"));

            // Dificuldade
            document.getElementById("btn-tranquilo").addEventListener("click", () => startGame("tranquilo"));
            document.getElementById("btn-original").addEventListener("click", () => startGame("original"));
            document.getElementById("btn-maldito").addEventListener("click", () => startGame("maldito"));

            // Áudio
            btnAudio.addEventListener("click", toggleAudio);

            // Jogo
            submitBtn.addEventListener("click", processInput);
            rollBtn.addEventListener("click", rollDice);
            restartBtn.addEventListener("click", restartGame);
            commandInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    processInput();
                }
            });

            // Inicialização
            showScreen("menu-principal");
            audioStatus.textContent = "Áudio: Desligado";
            btnAudio.textContent = "Ligar Áudio";
        })();
    </script>
</body>
</html>
