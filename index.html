<!DOCTYPE html>
<html>
<head>
    <title>RPG da Floresta</title>
</head>
<body>
    <h1>Floresta Sombria</h1>
    <div id="story"></div>
    <input type="text" id="input" placeholder="Digite aqui...">
    <button onclick="processInput()">Enviar</button>

    <script>
        var stage = 0;
        var gameOver = false;

        var stages = [
            {
                message: "Você está na entrada da Floresta Negra. Digite 'entrar' para começar.",
                expected: "entrar",
                nextMessage: "Você entra na floresta. A trilha se divide. Digite 'luz' para seguir o caminho iluminado."
            },
            {
                message: "A trilha se divide. Um caminho brilha com luz suave. Digite 'luz' para ir por ele.",
                expected: "luz",
                nextMessage: "Você segue a luz e encontra um lobo feroz! Digite 'lutar' para enfrentá-lo."
            },
            {
                message: "Um lobo aparece! Digite 'lutar' para combatê-lo.",
                expected: "lutar",
                nextMessage: "Você derrota o lobo. Uma cabana surge à frente. Digite 'descansar' para entrar."
            },
            {
                message: "Você está cansado. Digite 'descansar' para recuperar energias.",
                expected: "descansar",
                nextMessage: "Você descansa. Ao sair, vê a saída da floresta! Digite 'sair' para escapar."
            },
            {
                message: "A saída está próxima! Digite 'sair' para completar a jornada.",
                expected: "sair",
                nextMessage: null
            }
        ];

        function updateStory(message) {
            document.getElementById('story').innerHTML = '<p>' + message + '</p>';
        }

        function processInput() {
            if (gameOver) return;
            var input = document.getElementById('input').value.trim().toLowerCase();
            document.getElementById('input').value = '';

            var currentStage = stages[stage];

            if (input !== currentStage.expected) {
                gameOver = true;
                document.getElementById('story').innerHTML = '<p><b>Você morreu!</b> Sua jornada termina aqui. Recarregue a página para tentar novamente.</p>';
                document.getElementById('input').disabled = true;
                document.querySelector('button').disabled = true;
                return;
            }

            if (stage === stages.length - 1) {
                gameOver = true;
                document.getElementById('story').innerHTML = '<p><b>Parabéns!</b> Você escapou da floresta com vida! Vitória!</p>';
                document.getElementById('input').disabled = true;
                document.querySelector('button').disabled = true;
                return;
            }

            stage++;
            updateStory(stages[stage].message);
        }

        updateStory(stages[0].message);
    </script>
</body>
</html>
